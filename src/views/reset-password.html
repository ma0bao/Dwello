<!-- ═══════════════════════════════════════════
     VIEW: RESET PASSWORD
════════════════════════════════════════════ -->
<div id="view-reset-password" class="view" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--forest) 0%,#2D6A4F 50%,#40916C 100%);padding:32px;">
  <div style="width:100%;max-width:420px;">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--offwhite);letter-spacing:-0.03em;">Dwello</div>
    </div>

    <!-- Card: Request reset -->
    <div id="reset-request-card" style="background:var(--offwhite);border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(0,0,0,0.2);">
      <h2 style="font-family:'Playfair Display',serif;font-size:24px;color:var(--forest);margin:0 0 8px;">Reset password</h2>
      <p style="font-size:14px;color:rgba(26,36,32,0.6);margin:0 0 28px;">Enter your email and we'll send a reset link.</p>

      <form id="reset-request-form" onsubmit="handleResetRequest(event)" novalidate>
        <div id="reset-request-error" style="display:none;background:rgba(217,83,79,0.1);color:#B91C1C;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;"></div>
        <div id="reset-request-success" style="display:none;background:rgba(183,228,199,0.4);color:var(--forest);padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;"></div>

        <div style="margin-bottom:24px;">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--slate);margin-bottom:6px;">Email address</label>
          <input id="reset-email" type="email" autocomplete="email" placeholder="you@example.com"
            style="width:100%;box-sizing:border-box;padding:12px 16px;border:1.5px solid rgba(27,67,50,0.2);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--slate);background:#fff;outline:none;transition:border-color 0.15s;"
            onfocus="this.style.borderColor='var(--sage)'" onblur="this.style.borderColor='rgba(27,67,50,0.2)'" />
        </div>

        <button type="submit" class="btn-primary" style="width:100%;padding:14px;font-size:15px;justify-content:center;">
          Send reset link
        </button>

        <p style="text-align:center;font-size:14px;color:rgba(26,36,32,0.6);margin:20px 0 0;">
          <button type="button" onclick="showView('login')"
            style="background:none;border:none;padding:0;font-size:14px;color:var(--sage);cursor:pointer;font-family:'DM Sans',sans-serif;">
            Back to sign in
          </button>
        </p>
      </form>
    </div>

    <!-- Card: Set new password (shown after clicking email link) -->
    <div id="reset-new-password-card" style="display:none;background:var(--offwhite);border-radius:20px;padding:36px;box-shadow:0 24px 64px rgba(0,0,0,0.2);">
      <h2 style="font-family:'Playfair Display',serif;font-size:24px;color:var(--forest);margin:0 0 8px;">Set new password</h2>
      <p style="font-size:14px;color:rgba(26,36,32,0.6);margin:0 0 28px;">Choose a new password for your account.</p>

      <form id="reset-new-form" onsubmit="handleSetNewPassword(event)" novalidate>
        <div id="reset-new-error" style="display:none;background:rgba(217,83,79,0.1);color:#B91C1C;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;"></div>

        <div style="margin-bottom:24px;">
          <label style="display:block;font-size:13px;font-weight:600;color:var(--slate);margin-bottom:6px;">New password</label>
          <input id="reset-new-password" type="password" autocomplete="new-password" placeholder="At least 8 characters"
            style="width:100%;box-sizing:border-box;padding:12px 16px;border:1.5px solid rgba(27,67,50,0.2);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--slate);background:#fff;outline:none;transition:border-color 0.15s;"
            onfocus="this.style.borderColor='var(--sage)'" onblur="this.style.borderColor='rgba(27,67,50,0.2)'" />
        </div>

        <button type="submit" class="btn-primary" style="width:100%;padding:14px;font-size:15px;justify-content:center;">
          Update password
        </button>
      </form>
    </div>
  </div>
</div>
