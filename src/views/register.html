<!-- ═══════════════════════════════════════════
     VIEW: REGISTER
════════════════════════════════════════════ -->
<div id="view-register" class="view">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--forest) 0%,#2D6A4F 50%,#40916C 100%);padding:32px;">
    <div style="width:100%;max-width:420px;">

      <!-- Logo -->
      <div style="text-align:center;margin-bottom:32px;">
        <div style="font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--offwhite);letter-spacing:-0.03em;">Dwello</div>
        <div style="font-size:14px;color:rgba(248,246,241,0.6);margin-top:6px;">Property management, simplified.</div>
      </div>

      <!-- Card -->
      <div class="shadow-forest" style="background:var(--offwhite);border-radius:20px;padding:36px;">
        <h2 style="font-family:'Playfair Display',serif;font-size:24px;color:var(--forest);margin:0 0 8px;">Create account</h2>
        <p style="font-size:14px;color:rgba(26,36,32,0.6);margin:0 0 28px;">Start managing your properties today</p>

        <form id="register-form" onsubmit="handleRegister(event)" novalidate>

          <!-- Error banner -->
          <div id="register-error" style="display:none;background:rgba(217,83,79,0.1);color:#B91C1C;padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;"></div>
          <!-- Success banner -->
          <div id="register-success" style="display:none;background:rgba(183,228,199,0.4);color:var(--forest);padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;"></div>

          <!-- Full name -->
          <div style="margin-bottom:16px;">
            <label class="form-label" for="register-name">Full name</label>
            <input id="register-name" class="form-input" type="text" autocomplete="name" placeholder="Jane Smith" />
          </div>

          <!-- Email -->
          <div style="margin-bottom:16px;">
            <label class="form-label" for="register-email">Email address</label>
            <input id="register-email" class="form-input" type="email" autocomplete="email" placeholder="you@example.com" />
          </div>

          <!-- Password -->
          <div style="margin-bottom:24px;">
            <label class="form-label" for="register-password">Password</label>
            <input id="register-password" class="form-input" type="password" autocomplete="new-password" placeholder="At least 8 characters" />
          </div>

          <!-- Submit -->
          <button type="submit" id="register-submit" class="btn-primary" style="width:100%;justify-content:center;">
            Create account
          </button>

          <!-- Login link -->
          <p style="text-align:center;font-size:14px;color:rgba(26,36,32,0.6);margin:20px 0 0;">
            Already have an account?
            <button type="button" onclick="showView('login')"
              style="background:none;border:none;padding:0;font-size:14px;color:var(--sage);font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">
              Sign in
            </button>
          </p>

        </form>
      </div>
    </div>
  </div>
</div>
